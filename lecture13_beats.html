<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats & Resonance — Forced Undamped Oscillation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #0f0f13;
    color: #e8e6df;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    max-width: 800px;
    margin: 0 auto 2rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.12);
    padding-bottom: 1.2rem;
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: #e8e6df;
  }

  header p {
    font-size: 0.8rem;
    color: #888;
    margin-top: 0.3rem;
    font-family: 'Courier New', monospace;
  }

  .card {
    max-width: 800px;
    margin: 0 auto 1.5rem;
    background: #17171d;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .equation {
    font-family: 'Georgia', serif;
    font-size: 1rem;
    color: #7ab3e0;
    text-align: center;
    padding: 0.8rem 1rem;
    background: rgba(55, 138, 221, 0.07);
    border-radius: 8px;
    margin-bottom: 1.5rem;
    border: 0.5px solid rgba(55,138,221,0.2);
    font-style: italic;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .ctrl-row label {
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    color: #888;
    min-width: 120px;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #7ab3e0;
    cursor: pointer;
  }

  .val-display {
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    font-weight: bold;
    min-width: 48px;
    text-align: right;
    color: #e8e6df;
  }

  .badge {
    display: inline-block;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .badge-beats   { background: rgba(55,138,221,0.18); color: #7ab3e0; border: 0.5px solid rgba(55,138,221,0.3); }
  .badge-near    { background: rgba(239,159,39,0.18); color: #EF9F27; border: 0.5px solid rgba(239,159,39,0.3); }
  .badge-res     { background: rgba(216,90,48,0.18);  color: #D85A30; border: 0.5px solid rgba(216,90,48,0.3); }

  .preset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.2rem;
  }

  .preset-btn {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    padding: 5px 12px;
    border-radius: 6px;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover { background: rgba(255,255,255,0.07); color: #e8e6df; }
  .preset-btn.danger { border-color: rgba(216,90,48,0.5); color: #D85A30; }
  .preset-btn.danger:hover { background: rgba(216,90,48,0.1); }

  .chart-wrap {
    position: relative;
    width: 100%;
    height: 260px;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.8rem;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: #666;
  }

  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 24px; height: 2px; display: inline-block; border-radius: 1px; }

  .explanation {
    margin-top: 1.2rem;
    font-size: 0.85rem;
    line-height: 1.7;
    color: #999;
    min-height: 48px;
    padding-top: 0.8rem;
    border-top: 0.5px solid rgba(255,255,255,0.07);
  }

  .explanation em { color: #e8e6df; font-style: normal; }

  footer {
    max-width: 800px;
    margin: 1rem auto 0;
    font-size: 0.72rem;
    color: #444;
    font-family: 'Courier New', monospace;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Beats &amp; Resonance</h1>
  <p>x″ + ω₀²x = F₀ cos ωt &nbsp;|&nbsp; Forced undamped harmonic oscillation</p>
</header>

<div class="card">
  <div class="equation">
    x(t) = [2F₀ / (ω₀² − ω²)] · sin[(ω₀ − ω)t/2] · sin[(ω₀ + ω)t/2]
  </div>

  <div class="controls">
    <div class="ctrl-row">
      <label>forcing freq ω</label>
      <input type="range" id="omegaSlider" min="8" max="11" step="0.05" value="12">
      <span class="val-display" id="omegaVal">12.00</span>
      <span class="badge badge-beats" id="badge">beats</span>
    </div>
  </div>

  <div class="preset-row">
    <button class="preset-btn" onclick="setOmega(12)">ω = 12.00 (far)</button>
    <button class="preset-btn" onclick="setOmega(11.5)">ω = 11.50</button>
    <button class="preset-btn" onclick="setOmega(11.2)">ω = 11.20</button>
    <button class="preset-btn" onclick="setOmega(11.05)">ω = 11.05</button>
    <button class="preset-btn danger" onclick="setOmega(11)">ω = 11 = ω₀ (resonance)</button>
  </div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:#7ab3e0;"></span>x(t) — displacement</span>
    <span><span class="dot" style="background:#D85A30; border-top: 1.5px dashed #D85A30; background:none;"></span>amplitude envelope</span>
  </div>

  <div class="explanation" id="explanation"></div>
</div>

<footer>
  F₀ = 23 &nbsp;·&nbsp; ω₀ = 11 &nbsp;·&nbsp; x(0) = x′(0) = 0
  &nbsp;|&nbsp; Lecture 13 · Section 5.1.3
</footer>

<script>
const F0 = 23, omega0 = 11, N = 800;

function computeX(t, omega) {
  if (Math.abs(omega - omega0) < 0.005)
    return (F0 / (2 * omega0)) * t * Math.sin(omega0 * t);
  return (F0 / (omega0**2 - omega**2)) * (Math.cos(omega * t) - Math.cos(omega0 * t));
}

function getEnvelope(t, omega) {
  if (Math.abs(omega - omega0) < 0.005) return null;
  return Math.abs((2 * F0 / (omega0**2 - omega**2)) * Math.sin((omega0 - omega) * t / 2));
}

function buildData(omega) {
  const isRes = Math.abs(omega - omega0) < 0.005;
  const tMax = isRes ? 22 : 90;
  const ts = [], xs = [], ep = [], en = [];
  for (let i = 0; i <= N; i++) {
    const t = (i / N) * tMax;
    ts.push(+t.toFixed(3));
    xs.push(+computeX(t, omega).toFixed(4));
    const e = getEnvelope(t, omega);
    ep.push(e !== null ? +e.toFixed(4) : null);
    en.push(e !== null ? +(-e).toFixed(4) : null);
  }
  return { ts, xs, ep, en };
}

const { ts, xs, ep, en } = buildData(12);

const chart = new Chart(document.getElementById('chart').getContext('2d'), {
  type: 'line',
  data: {
    labels: ts,
    datasets: [
      { data: xs, borderColor: '#7ab3e0', borderWidth: 1.5, pointRadius: 0, tension: 0.1 },
      { data: ep, borderColor: '#D85A30', borderWidth: 1, borderDash: [5, 4], pointRadius: 0, tension: 0.2 },
      { data: en, borderColor: '#D85A30', borderWidth: 1, borderDash: [5, 4], pointRadius: 0, tension: 0.2 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 250 },
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    scales: {
      x: {
        ticks: { maxTicksLimit: 8, color: '#555', callback: (v, i) => +ts[i].toFixed(1) },
        grid: { color: 'rgba(255,255,255,0.04)' },
        title: { display: true, text: 't', color: '#555' }
      },
      y: {
        ticks: { color: '#555', maxTicksLimit: 6 },
        grid: { color: 'rgba(255,255,255,0.04)' },
        title: { display: true, text: 'x(t)', color: '#555' }
      }
    }
  }
});

function updateExplanation(omega) {
  const el = document.getElementById('explanation');
  const diff = Math.abs(omega - omega0);
  if (diff < 0.005) {
    el.innerHTML = '<em>Resonance (ω = ω₀).</em> The particular solution is x_p = (F₀/2ω₀)·t·sin(ω₀t). The factor t out front causes the amplitude to grow without bound — the driving force and the spring are perfectly in sync, so each push adds to the last.';
  } else if (diff < 0.25) {
    el.innerHTML = '<em>Near-resonance.</em> Beat period ≈ ' + (2*Math.PI/diff).toFixed(1) + ' s. The envelope swells very slowly and very tall. The two frequencies are almost identical, so constructive interference persists for a long time before cancellation sets in.';
  } else {
    el.innerHTML = '<em>Beats.</em> Beat period ≈ ' + (2*Math.PI/Math.abs(omega0 - omega)).toFixed(1) + ' s. Two oscillations at frequencies ' + omega.toFixed(2) + ' and ' + omega0 + ' interfere, creating periodic amplitude modulation. Slide ω toward 11 to watch the beats slow down and grow.';
  }
}

function updateBadge(omega) {
  const badge = document.getElementById('badge');
  const diff = Math.abs(omega - omega0);
  if (diff < 0.005) { badge.textContent = 'resonance'; badge.className = 'badge badge-res'; }
  else if (diff < 0.25) { badge.textContent = 'near-resonance'; badge.className = 'badge badge-near'; }
  else { badge.textContent = 'beats'; badge.className = 'badge badge-beats'; }
}

function setOmega(val) {
  document.getElementById('omegaSlider').value = val;
  document.getElementById('omegaVal').textContent = val.toFixed(2);
  const d = buildData(val);
  chart.data.labels = d.ts;
  chart.data.datasets[0].data = d.xs;
  chart.data.datasets[1].data = d.ep;
  chart.data.datasets[2].data = d.en;
  chart.update();
  updateExplanation(val);
  updateBadge(val);
}

document.getElementById('omegaSlider').addEventListener('input', function() {
  setOmega(parseFloat(this.value));
});

updateExplanation(12);
</script>
</body>
</html>
