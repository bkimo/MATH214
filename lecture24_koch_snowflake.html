
<style>
  #ksw { background:#0d1117; border-radius:10px; padding:12px 16px; }
  .kbtn { padding:6px 18px; border-radius:8px; border:1px solid #30363d;
          background:#161b22; color:#e6edf3; cursor:pointer; font-size:13px;
          font-family:sans-serif; transition:background .15s,border-color .15s; }
  .kbtn:hover { background:#21262d; border-color:#5DCAA5; }
  .kbtn.active { background:#0d3d30; border-color:#5DCAA5; color:#5DCAA5; }
  #kstats { display:flex; gap:32px; flex-wrap:wrap; margin-top:10px;
            font-size:13px; font-family:sans-serif; color:#8b949e; }
  #kstats b { color:#e6edf3; }
</style>
<div id="ksw">
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="kbtn active" onclick="setLevel(1,this)">K(1)</button>
    <button class="kbtn" onclick="setLevel(2,this)">K(2)</button>
    <button class="kbtn" onclick="setLevel(3,this)">K(3)</button>
    <button class="kbtn" onclick="setLevel(4,this)">K(4)</button>
    <button class="kbtn" onclick="setLevel(5,this)">K(5)</button>
  </div>
  <canvas id="kc" width="680" height="420" style="width:100%;border-radius:6px;display:block"></canvas>
  <div id="kstats"></div>
</div>
<script>
const canvas = document.getElementById('kc');
const ctx = canvas.getContext('2d');

function kochPoints(x1,y1,x2,y2,depth){
  if(depth===0) return [[x1,y1],[x2,y2]];
  const dx=x2-x1, dy=y2-y1;
  const ax=x1+dx/3, ay=y1+dy/3;
  const bx=x1+2*dx/3, by=y1+2*dy/3;
  const angle=Math.PI/3;
  const px=ax+(bx-ax)*Math.cos(angle)-(by-ay)*Math.sin(angle);
  const py=ay+(bx-ax)*Math.sin(angle)+(by-ay)*Math.cos(angle);
  const s1=kochPoints(x1,y1,ax,ay,depth-1);
  const s2=kochPoints(ax,ay,px,py,depth-1);
  const s3=kochPoints(px,py,bx,by,depth-1);
  const s4=kochPoints(bx,by,x2,y2,depth-1);
  return [...s1,...s2.slice(1),...s3.slice(1),...s4.slice(1)];
}

function draw(level){
  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);

  // dark background
  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,w,h);

  const cx=w/2, cy=h/2-10, R=158;
  const pts=[
    [cx, cy-R],
    [cx+R*Math.sin(2*Math.PI/3)*-1, cy+R*Math.cos(2*Math.PI/3)*-1],
    [cx+R*Math.sin(4*Math.PI/3)*-1, cy+R*Math.cos(4*Math.PI/3)*-1]
  ];
  const n=level-1;
  const side1=kochPoints(...pts[0],...pts[1],n);
  const side2=kochPoints(...pts[1],...pts[2],n);
  const side3=kochPoints(...pts[2],...pts[0],n);
  const all=[...side1,...side2.slice(1),...side3.slice(1)];

  // filled interior — dark teal tint matching screenshot
  ctx.beginPath();
  ctx.moveTo(all[0][0],all[0][1]);
  for(let i=1;i<all.length;i++) ctx.lineTo(all[i][0],all[i][1]);
  ctx.closePath();
  ctx.fillStyle='rgba(13,61,48,0.55)';
  ctx.fill();

  // glowing teal stroke — two passes for the glow effect
  ctx.beginPath();
  ctx.moveTo(all[0][0],all[0][1]);
  for(let i=1;i<all.length;i++) ctx.lineTo(all[i][0],all[i][1]);
  ctx.closePath();
  ctx.strokeStyle='rgba(93,202,165,0.18)';
  ctx.lineWidth = level>3 ? 3.5 : 5;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(all[0][0],all[0][1]);
  for(let i=1;i<all.length;i++) ctx.lineTo(all[i][0],all[i][1]);
  ctx.closePath();
  ctx.strokeStyle='#5DCAA5';
  ctx.lineWidth = level>3 ? 0.9 : 1.3;
  ctx.stroke();

  // stats
  const segs=3*Math.pow(4,level-1);
  const sideExp=`(1/3)^${level-1}`;
  const sideVal=(1/Math.pow(3,level-1)).toFixed(4);
  const perim=(3*Math.pow(4/3,level-1)).toFixed(3);
  document.getElementById('kstats').innerHTML=
    `<span><b>Segments:</b> ${segs.toLocaleString()}</span>`+
    `<span><b>Side length:</b> ${sideExp} = ${sideVal}</span>`+
    `<span><b>Perimeter:</b> 3·(4/3)^${level-1} = ${perim}</span>`;
}

function setLevel(n,btn){
  document.querySelectorAll('.kbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  draw(n);
}
draw(1);
</script>
